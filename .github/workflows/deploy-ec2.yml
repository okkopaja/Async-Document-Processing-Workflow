name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          : "${EC2_HOST:?Missing required secret: EC2_HOST}"
          : "${EC2_USER:?Missing required secret: EC2_USER}"
          : "${EC2_SSH_KEY:?Missing required secret: EC2_SSH_KEY}"

          EC2_PORT="${EC2_PORT:-22}"
          EC2_APP_DIR="${EC2_APP_DIR:-/home/ubuntu/Async-Document-Processing-Workflow}"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$EC2_SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

          if [ -n "${EC2_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$EC2_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> "$HOME/.ssh/known_hosts"
          fi
          chmod 644 "$HOME/.ssh/known_hosts"

          ssh -i "$HOME/.ssh/deploy_key" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$EC2_PORT" \
            "$EC2_USER@$EC2_HOST" \
            "cd '$EC2_APP_DIR' && bash infra/scripts/deploy-prod.sh '$GIT_SHA'"
